# jev-api — бэкенд (Кассандра, ИИ-чат). ОТДЕЛЬНЫЙ compose, чтобы базовый статик-деплой
# (docker-compose.web.yml) не зависел от секретов. Проект тот же — jevbest. Одна сеть.
# Секреты — из /opt/jevbest/.env (env_file). НИКОГДА --remove-orphans.
services:
  jev-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: jev-api:latest
    container_name: jev-api
    restart: unless-stopped
    env_file: [.env]
    networks: [appnet]
    user: "1000:1000"
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    tmpfs:
      - /tmp:size=32m
    mem_limit: 320m
    cpus: 0.75
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/api/health',timeout=4)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 12s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
networks:
  appnet:
    external: true
    name: videodead_appnet
